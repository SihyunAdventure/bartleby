# macOS 26 (Tahoe) 의 시스템 Swift runtime 은 /usr/lib/swift 에 ABI-stable 형태로 거주.
# screencapturekit 2.0 이 @rpath/libswift_Concurrency.dylib 를 요청하지만 LC_RPATH 가 비어있어
# dyld 가 못 찾음. cargo 빌드 시점에 explicit rpath 를 박아 해결.
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]

# audiopus_sys (libopus FFI) build script 가 pkg-config 호출 시 /opt/homebrew/bin
# 을 찾을 수 있도록. brew install opus + brew install pkg-config 가 prerequisite.
# force=false 라 사용자 shell PATH 에 이미 있으면 그대로 둠.
[env]
PATH = { value = "/opt/homebrew/bin", relative = false, force = false }
